<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>● PIANO</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0a;
    color: #f0f0f0;
    font-family: 'Space Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 28px;
    user-select: none;
    -webkit-user-select: none;
    padding: 20px;
    overflow-x: hidden;
  }

  h1 { font-size: 13px; letter-spacing: 4px; color: #555; text-transform: uppercase; }

  #note-display {
    font-size: 64px; font-weight: 700; letter-spacing: -2px;
    color: #f0f0f0; min-height: 76px; text-align: center; transition: color 0.1s;
  }
  #note-display.active { color: #ff3b30; }
  #freq-display { font-size: 11px; color: #444; letter-spacing: 2px; min-height: 18px; text-align: center; }

  /* ── SOUND SELECTOR ─────────────────────────────── */
  .sound-section { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .sound-label   { font-size: 10px; color: #444; letter-spacing: 3px; }

  .sound-presets {
    display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; max-width: 560px;
  }

  .sound-btn {
    background: #111; border: 1px solid #222; border-radius: 8px;
    color: #666; font-size: 22px; width: 52px; height: 52px;
    cursor: pointer; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 2px;
    transition: all 0.15s; position: relative;
  }
  .sound-btn span { font-size: 8px; color: #444; letter-spacing: 1px; }
  .sound-btn:hover  { border-color: #555; color: #f0f0f0; }
  .sound-btn.active { border-color: #ff3b30; background: #1a0800; color: #f0f0f0; }
  .sound-btn.active span { color: #ff3b30; }

  .sound-btn.add-btn {
    border-style: dashed; font-size: 20px; color: #333;
  }
  .sound-btn.add-btn:hover { border-color: #888; color: #888; }

  /* Custom sound modal */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.85); z-index: 200;
    align-items: center; justify-content: center;
  }
  .modal-overlay.visible { display: flex; }

  .modal {
    background: #111; border: 1px solid #333; border-radius: 12px;
    padding: 28px; width: 320px; display: flex; flex-direction: column; gap: 18px;
  }
  .modal h3 { font-size: 12px; letter-spacing: 3px; color: #888; }
  .modal-row { display: flex; flex-direction: column; gap: 6px; }
  .modal-row label { font-size: 10px; color: #555; letter-spacing: 2px; }
  .modal select, .modal input[type=range] {
    background: #0a0a0a; border: 1px solid #222; border-radius: 4px;
    color: #f0f0f0; font-family: 'Space Mono', monospace; font-size: 12px;
    padding: 8px; outline: none; width: 100%;
  }
  .modal input[type=range] { padding: 4px; accent-color: #ff3b30; }
  .modal-btns { display: flex; gap: 10px; }
  .modal-btn {
    flex: 1; padding: 10px; border-radius: 6px; border: none;
    font-family: 'Space Mono', monospace; font-size: 11px;
    letter-spacing: 2px; cursor: pointer; transition: opacity 0.15s;
  }
  .modal-btn.primary { background: #ff3b30; color: #fff; }
  .modal-btn.secondary { background: #1a1a1a; border: 1px solid #333; color: #888; }
  .modal-btn:hover { opacity: 0.8; }

  /* ── PIANO ──────────────────────────────────────── */
  .piano-wrapper { display: flex; flex-direction: column; align-items: center; gap: 16px; }

  .piano {
    position: relative; display: flex; height: 180px;
    background: #111; padding: 16px; border-radius: 8px;
    border: 1px solid #222; gap: 3px; overflow-x: auto;
    max-width: 100vw;
  }

  .key-white {
    position: relative; min-width: 44px; width: 44px; height: 146px;
    background: #f0f0f0; border-radius: 0 0 5px 5px;
    border: 1px solid #ccc; cursor: pointer;
    display: flex; flex-direction: column;
    justify-content: flex-end; align-items: center;
    padding-bottom: 8px; transition: background 0.05s, transform 0.05s; z-index: 1;
    -webkit-tap-highlight-color: transparent;
  }
  .key-white:hover  { background: #e8e8e8; }
  .key-white.pressed { background: #ff3b30; transform: scaleY(0.97); transform-origin: top; }
  .key-white .label { font-size: 10px; font-weight: 700; color: #888; letter-spacing: 1px; }
  .key-white.pressed .label { color: #fff; }
  .key-white .key-letter { font-size: 9px; color: #bbb; margin-top: 2px; }
  .key-white.pressed .key-letter { color: rgba(255,255,255,0.7); }

  /* Touch sustain ring */
  .key-white.touch-sustained {
    background: #ff8c00; box-shadow: 0 0 12px rgba(255,140,0,0.6);
  }
  .key-black.touch-sustained {
    background: #cc5500; box-shadow: 0 0 12px rgba(255,140,0,0.6);
  }

  .key-black {
    position: absolute; min-width: 28px; width: 28px; height: 90px;
    background: #111; border-radius: 0 0 4px 4px;
    border: 1px solid #333; cursor: pointer;
    display: flex; flex-direction: column;
    justify-content: flex-end; align-items: center;
    padding-bottom: 6px; z-index: 2;
    transition: background 0.05s, transform 0.05s; top: 16px;
    -webkit-tap-highlight-color: transparent;
  }
  .key-black:hover  { background: #222; }
  .key-black.pressed { background: #ff3b30; transform: scaleY(0.97); transform-origin: top; }
  .key-black .label { font-size: 8px; font-weight: 700; color: #555; letter-spacing: 1px; }
  .key-black.pressed .label { color: rgba(255,255,255,0.8); }
  .key-black .key-letter { font-size: 8px; color: #444; margin-top: 1px; }
  .key-black.pressed .key-letter { color: rgba(255,255,255,0.6); }

  /* Octave + controls */
  .controls-row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; justify-content: center; }

  .ctrl-btn {
    background: none; border: 1px solid #333; color: #555;
    font-family: 'Space Mono', monospace; font-size: 12px;
    padding: 6px 14px; cursor: pointer; border-radius: 4px; transition: all 0.15s;
  }
  .ctrl-btn:hover { border-color: #666; color: #f0f0f0; }

  #octave-label { font-size: 12px; color: #555; letter-spacing: 2px; min-width: 70px; text-align: center; }
  #sustain-indicator { font-size: 11px; color: #333; letter-spacing: 2px; }
  #sustain-indicator.on { color: #ff3b30; }

  /* Touch hint */
  .touch-hint { font-size: 10px; color: #2a2a2a; letter-spacing: 2px; text-align: center; }

  @media (hover: none) {
    .touch-hint { color: #444; }
    .key-white .key-letter, .key-black .key-letter { display: none; }
  }
</style>
</head>
<body>

<h1>● piano</h1>

<div>
  <div id="note-display">—</div>
  <div id="freq-display"></div>
</div>

<!-- SOUND SELECTOR -->
<div class="sound-section">
  <div class="sound-label">TIMBRE</div>
  <div class="sound-presets" id="sound-presets">
    <!-- generado por JS -->
  </div>
</div>

<!-- PIANO -->
<div class="piano-wrapper">
  <div class="piano" id="piano"></div>

  <div class="controls-row">
    <button class="ctrl-btn" id="oct-down">◀ OCT</button>
    <div id="octave-label">OCTAVE 4</div>
    <button class="ctrl-btn" id="oct-up">OCT ▶</button>
    <div id="sustain-indicator">SUSTAIN: OFF</div>
  </div>
</div>

<div class="touch-hint">📱 MANTÉN PRESIONADA UNA TECLA PARA SOSTENER LA NOTA</div>

<!-- MODAL: Custom sound -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3>+ SONIDO PERSONALIZADO</h3>
    <div class="modal-row">
      <label>NOMBRE</label>
      <input type="text" id="custom-name" maxlength="8" placeholder="MI SONIDO"
        style="background:#0a0a0a;border:1px solid #222;border-radius:4px;color:#f0f0f0;font-family:'Space Mono',monospace;font-size:12px;padding:8px;outline:none;width:100%">
    </div>
    <div class="modal-row">
      <label>EMOJI</label>
      <input type="text" id="custom-emoji" maxlength="2" placeholder="🎵"
        style="background:#0a0a0a;border:1px solid #222;border-radius:4px;color:#f0f0f0;font-family:'Space Mono',monospace;font-size:20px;padding:8px;outline:none;width:80px;text-align:center">
    </div>
    <div class="modal-row">
      <label>ONDA</label>
      <select id="custom-type">
        <option value="sine">SINE — suave, pura</option>
        <option value="square">SQUARE — cuadrada, retro</option>
        <option value="sawtooth">SAWTOOTH — aserrada, brillante</option>
        <option value="triangle">TRIANGLE — triangular, cálida</option>
      </select>
    </div>
    <div class="modal-row">
      <label>ATAQUE <span id="atk-val">5ms</span></label>
      <input type="range" id="custom-attack" min="1" max="300" value="5">
    </div>
    <div class="modal-row">
      <label>DECAY / RELEASE <span id="rel-val">0.8s</span></label>
      <input type="range" id="custom-release" min="1" max="30" value="8">
    </div>
    <div class="modal-btns">
      <button class="modal-btn secondary" onclick="closeModal()">CANCELAR</button>
      <button class="modal-btn primary" onclick="saveCustom()">AGREGAR</button>
    </div>
  </div>
</div>

<script>
// ─── SOUND PRESETS ────────────────────────────────────────────────────────────
const PRESETS = [
  {
    id:'piano', icon:'🎹', label:'PIANO',
    play(freq, ctx) {
      const o = ctx.createOscillator(), g = ctx.createGain(), f = ctx.createBiquadFilter();
      o.type = 'triangle'; f.type = 'lowpass'; f.frequency.value = 3000; f.Q.value = 0.5;
      g.gain.setValueAtTime(0, ctx.currentTime);
      g.gain.linearRampToValueAtTime(0.5, ctx.currentTime + 0.005);
      g.gain.exponentialRampToValueAtTime(0.3, ctx.currentTime + 0.1);
      o.frequency.value = freq;
      o.connect(f); f.connect(g); g.connect(ctx.destination);
      o.start(); return { osc:o, gain:g };
    }
  },
  {
    id:'guitar', icon:'🎸', label:'GUITARRA',
    play(freq, ctx) {
      const o = ctx.createOscillator(), g = ctx.createGain(), f = ctx.createBiquadFilter();
      o.type = 'sawtooth'; f.type = 'lowpass'; f.frequency.value = 2000; f.Q.value = 1;
      g.gain.setValueAtTime(0.6, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 1.2);
      o.frequency.value = freq;
      o.connect(f); f.connect(g); g.connect(ctx.destination);
      o.start(); return { osc:o, gain:g };
    }
  },
  {
    id:'organ', icon:'⛪', label:'ORGANO',
    play(freq, ctx) {
      const master = ctx.createGain(); master.gain.value = 0.2; master.connect(ctx.destination);
      const oscs = [1, 2, 3].map(mult => {
        const o = ctx.createOscillator(), g = ctx.createGain();
        o.type = 'sine'; o.frequency.value = freq * mult;
        g.gain.value = mult === 1 ? 0.6 : mult === 2 ? 0.3 : 0.1;
        o.connect(g); g.connect(master); o.start();
        return o;
      });
      // Return first osc and master gain for stop
      return { osc: { stop: (t) => oscs.forEach(o => o.stop(t)) }, gain: master };
    }
  },
  {
    id:'flute', icon:'🪈', label:'FLAUTA',
    play(freq, ctx) {
      const o = ctx.createOscillator(), g = ctx.createGain(), f = ctx.createBiquadFilter();
      o.type = 'sine'; f.type = 'bandpass'; f.frequency.value = freq; f.Q.value = 10;
      g.gain.setValueAtTime(0, ctx.currentTime);
      g.gain.linearRampToValueAtTime(0.4, ctx.currentTime + 0.08);
      o.frequency.value = freq;
      // Vibrato
      const lfo = ctx.createOscillator(), lfoG = ctx.createGain();
      lfo.frequency.value = 5.5; lfoG.gain.value = freq * 0.01;
      lfo.connect(lfoG); lfoG.connect(o.frequency); lfo.start();
      o.connect(f); f.connect(g); g.connect(ctx.destination);
      o.start(); return { osc:{ stop:(t)=>{ o.stop(t); lfo.stop(t); } }, gain:g };
    }
  },
  {
    id:'trumpet', icon:'🎺', label:'TROMPETA',
    play(freq, ctx) {
      const o = ctx.createOscillator(), g = ctx.createGain(), f = ctx.createBiquadFilter();
      o.type = 'square'; f.type = 'lowpass'; f.frequency.value = 1500; f.Q.value = 2;
      g.gain.setValueAtTime(0, ctx.currentTime);
      g.gain.linearRampToValueAtTime(0.4, ctx.currentTime + 0.02);
      o.frequency.value = freq;
      o.connect(f); f.connect(g); g.connect(ctx.destination);
      o.start(); return { osc:o, gain:g };
    }
  },
  {
    id:'violin', icon:'🎻', label:'VIOLIN',
    play(freq, ctx) {
      const o = ctx.createOscillator(), g = ctx.createGain(), f = ctx.createBiquadFilter();
      o.type = 'sawtooth'; f.type = 'lowpass'; f.frequency.value = 2500; f.Q.value = 0.7;
      g.gain.setValueAtTime(0, ctx.currentTime);
      g.gain.linearRampToValueAtTime(0.35, ctx.currentTime + 0.15);
      o.frequency.value = freq;
      const lfo = ctx.createOscillator(), lfoG = ctx.createGain();
      lfo.frequency.value = 6; lfoG.gain.value = freq * 0.008;
      lfo.connect(lfoG); lfoG.connect(o.frequency); lfo.start();
      o.connect(f); f.connect(g); g.connect(ctx.destination);
      o.start(); return { osc:{ stop:(t)=>{ o.stop(t); lfo.stop(t); } }, gain:g };
    }
  },
  {
    id:'bocina', icon:'📯', label:'BOCINA',
    play(freq, ctx) {
      const o = ctx.createOscillator(), g = ctx.createGain(), f = ctx.createBiquadFilter();
      o.type = 'square'; f.type = 'bandpass'; f.frequency.value = freq * 1.5; f.Q.value = 3;
      g.gain.setValueAtTime(0, ctx.currentTime);
      g.gain.linearRampToValueAtTime(0.5, ctx.currentTime + 0.01);
      g.gain.setValueAtTime(0.5, ctx.currentTime + 0.05);
      g.gain.exponentialRampToValueAtTime(0.3, ctx.currentTime + 0.3);
      o.frequency.value = freq;
      o.connect(f); f.connect(g); g.connect(ctx.destination);
      o.start(); return { osc:o, gain:g };
    }
  },
  {
    id:'cat', icon:'🐱', label:'GATO',
    play(freq, ctx) {
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.type = 'sine';
      // Pitch slide (maullido)
      o.frequency.setValueAtTime(freq * 1.3, ctx.currentTime);
      o.frequency.exponentialRampToValueAtTime(freq, ctx.currentTime + 0.15);
      o.frequency.exponentialRampToValueAtTime(freq * 1.1, ctx.currentTime + 0.3);
      g.gain.setValueAtTime(0, ctx.currentTime);
      g.gain.linearRampToValueAtTime(0.45, ctx.currentTime + 0.05);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.6);
      o.connect(g); g.connect(ctx.destination);
      o.start(); return { osc:o, gain:g };
    }
  },
  {
    id:'dog', icon:'🐶', label:'PERRO',
    play(freq, ctx) {
      const o = ctx.createOscillator(), g = ctx.createGain(), f = ctx.createBiquadFilter();
      o.type = 'sawtooth'; f.type = 'lowpass'; f.frequency.value = 800; f.Q.value = 2;
      o.frequency.setValueAtTime(freq * 0.7, ctx.currentTime);
      o.frequency.linearRampToValueAtTime(freq, ctx.currentTime + 0.04);
      g.gain.setValueAtTime(0.5, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.25);
      o.connect(f); f.connect(g); g.connect(ctx.destination);
      o.start(); return { osc:o, gain:g };
    }
  },
  {
    id:'duck', icon:'🦆', label:'PATO',
    play(freq, ctx) {
      const o = ctx.createOscillator(), mod = ctx.createOscillator();
      const modG = ctx.createGain(), g = ctx.createGain();
      o.type = 'square'; mod.type = 'sine';
      mod.frequency.value = 30; modG.gain.value = freq * 0.3;
      o.frequency.value = freq;
      mod.connect(modG); modG.connect(o.frequency);
      g.gain.setValueAtTime(0, ctx.currentTime);
      g.gain.linearRampToValueAtTime(0.4, ctx.currentTime + 0.02);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.35);
      o.connect(g); g.connect(ctx.destination);
      mod.start(); o.start();
      return { osc:{ stop:(t)=>{ o.stop(t); mod.stop(t); } }, gain:g };
    }
  },
  {
    id:'bell', icon:'🔔', label:'CAMPANA',
    play(freq, ctx) {
      const master = ctx.createGain(); master.connect(ctx.destination);
      master.gain.setValueAtTime(0.4, ctx.currentTime);
      master.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 2.5);
      const oscs = [1, 2.756, 5.404].map(mult => {
        const o = ctx.createOscillator(), g = ctx.createGain();
        o.type = 'sine'; o.frequency.value = freq * mult;
        g.gain.value = mult === 1 ? 1 : mult < 3 ? 0.5 : 0.2;
        o.connect(g); g.connect(master); o.start();
        return o;
      });
      return { osc:{ stop:(t)=>oscs.forEach(o=>o.stop(t)) }, gain:master };
    }
  },
  {
    id:'bass', icon:'🔊', label:'BAJO',
    play(freq, ctx) {
      const o = ctx.createOscillator(), g = ctx.createGain(), f = ctx.createBiquadFilter();
      o.type = 'sawtooth'; f.type = 'lowpass'; f.frequency.value = 400; f.Q.value = 0.5;
      g.gain.setValueAtTime(0, ctx.currentTime);
      g.gain.linearRampToValueAtTime(0.6, ctx.currentTime + 0.01);
      g.gain.exponentialRampToValueAtTime(0.3, ctx.currentTime + 0.3);
      o.frequency.value = freq / 2; // una octava abajo
      o.connect(f); f.connect(g); g.connect(ctx.destination);
      o.start(); return { osc:o, gain:g };
    }
  },
];

// Custom presets (agregados por usuario)
let customPresets = JSON.parse(localStorage.getItem('piano-custom') || '[]');

// ─── AUDIO STATE ─────────────────────────────────────────────────────────────
let audioCtx = null;
let currentPreset = 'piano';
let octave = 4;
let sustain = false;
const activeNodes = {};
const touchSustained = new Set(); // teclas sostenidas por touch hold

function getCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function getPreset(id) {
  return PRESETS.find(p => p.id === id) || customPresets.find(p => p.id === id) || PRESETS[0];
}

const NOTE_NAMES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
function noteToFreq(note, oct) {
  const d = (oct - 4) * 12 + NOTE_NAMES.indexOf(note) - 9;
  return 440 * Math.pow(2, d / 12);
}

// ─── PLAY / STOP ─────────────────────────────────────────────────────────────
function playNote(noteId, note, oct) {
  if (activeNodes[noteId]) return;
  const ctx = getCtx();
  const freq = noteToFreq(note, oct);
  const preset = getPreset(currentPreset);
  const nodes = preset.play(freq, ctx);
  activeNodes[noteId] = nodes;

  const display = document.getElementById('note-display');
  display.textContent = note + oct;
  display.classList.add('active');
  document.getElementById('freq-display').textContent = freq.toFixed(2) + ' Hz';
}

function stopNote(noteId, force = false) {
  if (!force && (sustain || touchSustained.has(noteId))) return;
  releaseNote(noteId);
}

function releaseNote(noteId) {
  const node = activeNodes[noteId];
  if (!node) return;
  const ctx = getCtx();
  try {
    node.gain.gain.cancelScheduledValues(ctx.currentTime);
    node.gain.gain.setValueAtTime(node.gain.gain.value, ctx.currentTime);
    node.gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.4);
    node.osc.stop(ctx.currentTime + 0.4);
  } catch(e) {}
  delete activeNodes[noteId];
  touchSustained.delete(noteId);

  // Update visual
  const el = document.querySelector(`[data-note-id="${noteId}"]`);
  if (el) el.classList.remove('touch-sustained');

  setTimeout(() => {
    if (Object.keys(activeNodes).length === 0) {
      document.getElementById('note-display').textContent = '—';
      document.getElementById('note-display').classList.remove('active');
      document.getElementById('freq-display').textContent = '';
    }
  }, 500);
}

// ─── PIANO LAYOUT ────────────────────────────────────────────────────────────
const WHITE_KEYS = [
  {note:'C', key:'a'}, {note:'D', key:'s'}, {note:'E', key:'d'},
  {note:'F', key:'f'}, {note:'G', key:'g'}, {note:'A', key:'h'},
  {note:'B', key:'j'},
  {note:'C', key:'k', octaveOffset:1}, {note:'D', key:'l', octaveOffset:1},
];

const BLACK_KEYS = [
  {note:'C#', key:'w', whiteIndex:0}, {note:'D#', key:'e', whiteIndex:1},
  {note:'F#', key:'t', whiteIndex:3}, {note:'G#', key:'y', whiteIndex:4},
  {note:'A#', key:'u', whiteIndex:5},
  {note:'C#', key:'o', whiteIndex:7, octaveOffset:1},
  {note:'D#', key:'p', whiteIndex:8, octaveOffset:1},
];

const WHITE_W = 44, WHITE_GAP = 3;

function buildPiano() {
  const piano = document.getElementById('piano');
  piano.innerHTML = '';

  WHITE_KEYS.forEach((k, i) => {
    const el = document.createElement('div');
    el.className = 'key-white';
    el.dataset.noteId = k.key;
    const oct = k.octaveOffset ? octave + k.octaveOffset : octave;
    el.innerHTML = `<span class="label">${k.note}${oct}</span><span class="key-letter">${k.key.toUpperCase()}</span>`;

    // Mouse
    el.addEventListener('mousedown', e => { e.preventDefault(); playNote(k.key, k.note, oct); el.classList.add('pressed'); });
    el.addEventListener('mouseup',   () => { stopNote(k.key); el.classList.remove('pressed'); });
    el.addEventListener('mouseleave',() => { stopNote(k.key); el.classList.remove('pressed'); });

    // Touch
    attachTouch(el, k, oct);
    piano.appendChild(el);
  });

  BLACK_KEYS.forEach(k => {
    const el = document.createElement('div');
    el.className = 'key-black';
    el.dataset.noteId = k.key;
    const oct = k.octaveOffset ? octave + k.octaveOffset : octave;
    el.innerHTML = `<span class="label">${k.note}</span><span class="key-letter">${k.key.toUpperCase()}</span>`;

    const left = 16 + k.whiteIndex * (WHITE_W + WHITE_GAP) + (WHITE_W + WHITE_GAP) - 14 - 1;
    el.style.left = left + 'px';

    el.addEventListener('mousedown', e => { e.preventDefault(); playNote(k.key, k.note, oct); el.classList.add('pressed'); });
    el.addEventListener('mouseup',   () => { stopNote(k.key); el.classList.remove('pressed'); });
    el.addEventListener('mouseleave',() => { stopNote(k.key); el.classList.remove('pressed'); });

    attachTouch(el, k, oct);
    piano.appendChild(el);
  });
}

// ─── TOUCH HANDLING ──────────────────────────────────────────────────────────
function attachTouch(el, k, oct) {
  let holdTimer = null;
  const HOLD_MS = 350;

  el.addEventListener('touchstart', e => {
    e.preventDefault();
    getCtx(); // unlock audio on iOS
    playNote(k.key, k.note, oct);
    el.classList.add('pressed');

    holdTimer = setTimeout(() => {
      // Hold = sustain this note
      touchSustained.add(k.key);
      el.classList.remove('pressed');
      el.classList.add('touch-sustained');
      navigator.vibrate && navigator.vibrate(40);
    }, HOLD_MS);

  }, { passive: false });

  el.addEventListener('touchend', e => {
    e.preventDefault();
    clearTimeout(holdTimer);
    if (!touchSustained.has(k.key)) {
      stopNote(k.key, true);
      el.classList.remove('pressed');
    }
  }, { passive: false });

  el.addEventListener('touchcancel', e => {
    clearTimeout(holdTimer);
    stopNote(k.key, true);
    el.classList.remove('pressed');
  }, { passive: false });
}

// ─── KEYBOARD ────────────────────────────────────────────────────────────────
const allKeys = [...WHITE_KEYS, ...BLACK_KEYS];
const keyMap  = {};
allKeys.forEach(k => keyMap[k.key] = k);

document.addEventListener('keydown', e => {
  if (e.repeat) return;
  const k = e.key.toLowerCase();
  if (k === ' ') {
    sustain = true;
    document.getElementById('sustain-indicator').textContent = 'SUSTAIN: ON';
    document.getElementById('sustain-indicator').classList.add('on');
    return;
  }
  const def = keyMap[k];
  if (!def) return;
  const oct = def.octaveOffset ? octave + def.octaveOffset : octave;
  playNote(def.key, def.note, oct);
  const el = document.querySelector(`[data-note-id="${def.key}"]`);
  if (el) el.classList.add('pressed');
});

document.addEventListener('keyup', e => {
  const k = e.key.toLowerCase();
  if (k === ' ') {
    sustain = false;
    document.getElementById('sustain-indicator').textContent = 'SUSTAIN: OFF';
    document.getElementById('sustain-indicator').classList.remove('on');
    Object.keys(activeNodes).forEach(id => releaseNote(id));
    return;
  }
  const def = keyMap[k];
  if (!def) return;
  stopNote(def.key);
  const el = document.querySelector(`[data-note-id="${def.key}"]`);
  if (el) el.classList.remove('pressed');
});

// ─── OCTAVE ──────────────────────────────────────────────────────────────────
document.getElementById('oct-down').addEventListener('click', () => { if (octave > 1) { octave--; updateOctave(); } });
document.getElementById('oct-up')  .addEventListener('click', () => { if (octave < 7) { octave++; updateOctave(); } });
function updateOctave() { document.getElementById('octave-label').textContent = `OCTAVE ${octave}`; buildPiano(); }

// ─── SOUND SELECTOR UI ───────────────────────────────────────────────────────
function buildSoundSelector() {
  const container = document.getElementById('sound-presets');
  container.innerHTML = '';

  const allPresets = [...PRESETS, ...customPresets];
  allPresets.forEach(p => {
    const btn = document.createElement('button');
    btn.className = 'sound-btn' + (p.id === currentPreset ? ' active' : '');
    btn.dataset.id = p.id;
    btn.innerHTML = `${p.icon}<span>${p.label}</span>`;
    btn.addEventListener('click', () => {
      // Stop all notes first
      Object.keys(activeNodes).forEach(id => releaseNote(id));
      currentPreset = p.id;
      document.querySelectorAll('.sound-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    });
    container.appendChild(btn);
  });

  // Botón +
  const addBtn = document.createElement('button');
  addBtn.className = 'sound-btn add-btn';
  addBtn.innerHTML = `+<span>NUEVO</span>`;
  addBtn.addEventListener('click', openModal);
  container.appendChild(addBtn);
}

// ─── MODAL CUSTOM SOUND ──────────────────────────────────────────────────────
function openModal() {
  document.getElementById('modal').classList.add('visible');
}
function closeModal() {
  document.getElementById('modal').classList.remove('visible');
}

document.getElementById('custom-attack').addEventListener('input', function() {
  document.getElementById('atk-val').textContent = this.value + 'ms';
});
document.getElementById('custom-release').addEventListener('input', function() {
  document.getElementById('rel-val').textContent = (this.value / 10).toFixed(1) + 's';
});

function saveCustom() {
  const name    = (document.getElementById('custom-name').value  || 'CUSTOM').toUpperCase().slice(0,8);
  const emoji   = document.getElementById('custom-emoji').value  || '🎵';
  const type    = document.getElementById('custom-type').value;
  const attack  = parseInt(document.getElementById('custom-attack').value) / 1000;
  const release = parseInt(document.getElementById('custom-release').value) / 10;

  const id = 'custom_' + Date.now();
  const preset = {
    id, icon: emoji, label: name,
    play(freq, ctx) {
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.type = type; o.frequency.value = freq;
      g.gain.setValueAtTime(0, ctx.currentTime);
      g.gain.linearRampToValueAtTime(0.45, ctx.currentTime + attack);
      g.gain.exponentialRampToValueAtTime(0.3, ctx.currentTime + attack + 0.1);
      o.connect(g); g.connect(ctx.destination); o.start();
      return { osc:o, gain:g };
    }
  };

  customPresets.push(preset);
  // Guardar versión serializable (sin función)
  const saved = JSON.parse(localStorage.getItem('piano-custom') || '[]');
  saved.push({ id, icon: emoji, label: name, type, attack: attack*1000, release: release*10 });
  localStorage.setItem('piano-custom', JSON.stringify(saved));

  closeModal();
  currentPreset = id;
  buildSoundSelector();
}

// Restaurar custom presets del localStorage
customPresets = JSON.parse(localStorage.getItem('piano-custom') || '[]').map(p => ({
  id: p.id, icon: p.icon, label: p.label,
  play(freq, ctx) {
    const atk = (p.attack || 5) / 1000;
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.type = p.type || 'sine'; o.frequency.value = freq;
    g.gain.setValueAtTime(0, ctx.currentTime);
    g.gain.linearRampToValueAtTime(0.45, ctx.currentTime + atk);
    g.gain.exponentialRampToValueAtTime(0.3, ctx.currentTime + atk + 0.1);
    o.connect(g); g.connect(ctx.destination); o.start();
    return { osc:o, gain:g };
  }
}));

// ─── INIT ────────────────────────────────────────────────────────────────────
buildSoundSelector();
buildPiano();

// Tap outside modal
document.getElementById('modal').addEventListener('click', e => {
  if (e.target === document.getElementById('modal')) closeModal();
});
</script>
